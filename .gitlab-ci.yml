stages:
    - doc
    - test

test-lint:
    stage: test
    image: "python:3.13"
    needs: []
    script:
        - pip install isort black[jupyter] flake8-docstrings
        - isort --check . -v
        - black --check */ -v
        - flake8 . -v
    when: always

test-package:
    stage: test
    needs: []
    parallel:
        matrix:
            - IMAGE: ["python:3.9", "python:3.10", "python:3.13"]
    image: $IMAGE
    before_script:
        # missing dependencies for pyvista
        - apt-get update && apt-get install libgl1 -y
    script:
        - pip install .[TEST]
        - pytest --cov=. --cov-config=pyproject.toml --cov-report term
          --cov-report xml:./tests/coverage.xml
    coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
    artifacts:
        untracked: false
        reports:
            coverage_report:
                coverage_format: cobertura
                path: ./tests/coverage.xml
        when: always

doc-build:
    stage: doc
    image: "python:3.13"
    needs: []
    before_script:
        - pip install --upgrade pip
    script:
        - git config --global user.name "${GITLAB_USER_NAME}"
        - git config --global user.email "${GITLAB_USER_EMAIL}"
        - git remote set-url origin https://gitlab-ci-token:${pyGCD_access_token}@gitlab.kit.edu/kit/fast/lb/collaboration/additive-manufacturing/pygcodedecode.git
        - pip install -e .[DOCS]
        - pydoc-markdown
        - cd docs
        - mkdocs gh-deploy
    artifacts:
        untracked: false
        paths:
            - ./docs/site/
            - ./docs/content/*.md
        when: always
        expire_in: "30 days"

doc-compile_paper:
    stage: doc
    needs: []
    rules:
        - when: manual
    tags:
        - shell
    script:
        - docker run --rm --volume $PWD/paper:/data --user $(id -u):$(id -g)
          --env JOURNAL=joss openjournals/inara
    artifacts:
        untracked: false
        paths:
            - ./paper/*.pdf
        when: always
        expire_in: "30 days"
