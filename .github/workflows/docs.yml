name: Build and Deploy Documentation

on:
  push:
    branches: [ main, public_pre_main ]
  pull_request:
    branches: [ main, public_pre_main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Upgrade pip
        run: pip install --upgrade pip
      - name: Install dependencies
        run: pip install -e .[DOCS]
      - name: Build docs with pydoc-markdown
        run: pydoc-markdown
      - name: Build site with mkdocs
        run: mkdocs build
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: docs/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/public_pre_main'
    steps:
      - uses: actions/checkout@v4
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: public
      # Add your deployment steps here (e.g., GitHub Pages, FTP, etc.)
